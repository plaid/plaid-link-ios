name: CI

on:
  pull_request:

jobs:
  linkkit-objc-tests:
    name: LinkKit ObjC Tests
    runs-on: macos-15

    steps:
      - name: Check out plaid-link-ios
        uses: actions/checkout@v4
        with:
          path: plaid-link-ios

      - name: Check out plaid-link-ios-spm
        uses: actions/checkout@v4
        with:
          repository: plaid/plaid-link-ios-spm
          ref: master
          path: plaid-link-ios-spm

      - name: Prepare ObjC compatibility package
        run: |
          package_path="$RUNNER_TEMP/LinkKitObjCPackage"
          mkdir -p "$package_path/Sources"
          rsync -a "$GITHUB_WORKSPACE/plaid-link-ios-spm/Sources/ObjC-Support" "$package_path/Sources/"
          rsync -a "$GITHUB_WORKSPACE/plaid-link-ios-spm/Tests" "$package_path/"
          rsync -a "$GITHUB_WORKSPACE/plaid-link-ios/LinkKit.xcframework" "$package_path/"

          cat > "$package_path/Package.swift" <<'SWIFT'
          // swift-tools-version: 5.10
          import PackageDescription

          let package = Package(
              name: "LinkKit",
              platforms: [
                  .iOS(.v15),
                  .macCatalyst(.v15),
              ],
              products: [
                  .library(
                      name: "LinkKit",
                      targets: ["LinkKit"]
                  ),
                  .library(
                      name: "LinkKitObjC",
                      targets: ["LinkKitObjC"]
                  )
              ],
              targets: [
                  .target(
                      name: "LinkKitObjC",
                      dependencies: [
                          "LinkKitObjCInternal",
                          "LinkKit"
                      ],
                      path: "Sources/ObjC-Support/Swift"
                  ),
                  .target(
                      name: "LinkKitObjCInternal",
                      dependencies: [
                          "LinkKit"
                      ],
                      path: "Sources/ObjC-Support/ObjectiveC",
                      publicHeadersPath: "include"
                  ),
                  .binaryTarget(
                      name: "LinkKit",
                      path: "LinkKit.xcframework"
                  ),
                  .testTarget(
                      name: "LinkKitObjCTests",
                      dependencies: [
                          "LinkKit",
                          "LinkKitObjC",
                          "LinkKitObjCInternal"
                      ]
                  ),
              ]
          )
          SWIFT

      - name: Run ObjC compatibility tests
        run: |
          cd "$RUNNER_TEMP/LinkKitObjCPackage"
          xcodebuild test \
            -scheme LinkKit-Package \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages" \
            CODE_SIGNING_ALLOWED=NO

  build-uikit-demo:
    name: Build UIKit Demo
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build UIKit demo app
        run: |
          xcodebuild build \
            -project LinkDemo-UIKit/LinkDemo-UIKit.xcodeproj \
            -scheme LinkDemo-UIKit \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$RUNNER_TEMP/UIKitDerivedData" \
            CODE_SIGNING_ALLOWED=NO

  build-swiftui-demo:
    name: Build SwiftUI Demo
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build SwiftUI demo app
        run: |
          xcodebuild build \
            -project LinkDemo-SwiftUI/LinkDemo-SwiftUI.xcodeproj \
            -scheme LinkDemo-SwiftUI \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$RUNNER_TEMP/SwiftUIDerivedData" \
            CODE_SIGNING_ALLOWED=NO
